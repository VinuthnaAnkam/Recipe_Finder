<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Recipe Finder</title>
    <link rel="stylesheet" href="home.css">
</head>
<body>
      <div class="hero">
   <h1><span class="recipe">Recipe</span> <span class="finder">Finder</span></h1>
   <h2>Find the best recipes for your taste!</h2>
  <div class="search-container">

        <span class="search-icon">&#128269;</span>

        <input
            type="text"
            id="searchInput"
            placeholder="Search for recipes (e.g. pizza, chicken, pasta...)">
            <button id="searchButton">Search</button>
  </div>
  
         <div class="categories">
          <button class="category active">🍽 All</button>
    <button class="category">☕ Breakfast</button>
    <button class="category">🥪 Lunch</button>
    <button class="category">🍲 Dinner</button>
    <button class="category">🍨Dessert</button>
  </div>
  <div id="Toggle"><button id="card-toggle">Veg</button></div>
</body>
</html>
